name: Build (Pre-release)

on:
  workflow_dispatch:
    inputs:
      number:
        description: "Pre-release number (1, 2, 3...)"
        required: true
        default: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.loader == 'neoforge' }}
    strategy:
      fail-fast: false
      matrix:
        loader: [fabric, neoforge]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Extract version information
        id: version
        shell: bash
        run: |
          set -euo pipefail

          BASE_VERSION="$(jq -r '."."' .release-please-manifest.json)"
          if [[ -z "$BASE_VERSION" || "$BASE_VERSION" == "null" ]]; then
            echo "Failed to resolve BASE_VERSION from .release-please-manifest.json" >&2
            exit 1
          fi

          NUMBER="${{ inputs.number }}"
          [[ "$NUMBER" =~ ^[1-9][0-9]*$ ]] || { echo "Invalid number: must be a positive integer"; exit 1; }

          PRE_VERSION="${BASE_VERSION}-pre.${NUMBER}"

          MC_VERSION="$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2)"
          LOADER="${{ matrix.loader }}"

          FULL_VERSION="${PRE_VERSION}+mc${MC_VERSION}.${LOADER}"

          GRADLE_TASK=":${LOADER}:jar"

          [[ "$LOADER" == "neoforge" ]] && LOADER_SHORT="n" || LOADER_SHORT="f"

          MODRINTH_VERSION="${PRE_VERSION}+mc${MC_VERSION}.${LOADER_SHORT}"
          (( ${#MODRINTH_VERSION} > 32 )) && MODRINTH_VERSION="${MODRINTH_VERSION:0:32}"

          echo "pre_version=$PRE_VERSION" >> $GITHUB_OUTPUT
          echo "modrinth_version=$MODRINTH_VERSION" >> $GITHUB_OUTPUT
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "minecraft_version=$MC_VERSION" >> $GITHUB_OUTPUT
          echo "loader=$LOADER" >> $GITHUB_OUTPUT
          echo "gradle_task=$GRADLE_TASK" >> $GITHUB_OUTPUT

          echo "Building $FULL_VERSION"

      - name: Build
        run: ./gradlew ${{ steps.version.outputs.gradle_task }} --console=plain
        env:
          MOD_VERSION: ${{ steps.version.outputs.full_version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: template-${{ steps.version.outputs.full_version }}
          path: ${{ matrix.loader }}/build/libs/template-${{ steps.version.outputs.full_version }}.jar

      - name: Publish
        # NeoForge publishing deferred until stable
        if: matrix.loader == 'fabric'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-version: ${{ steps.version.outputs.modrinth_version }}

          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          game-version-filter: releases
          version-type: beta
          version: ${{ steps.version.outputs.full_version }}
          name: "Template v${{ steps.version.outputs.pre_version }} for ${{ steps.version.outputs.loader }} ${{ steps.version.outputs.minecraft_version }}"

          files: ${{ matrix.loader }}/build/libs/template-${{ steps.version.outputs.full_version }}.jar
