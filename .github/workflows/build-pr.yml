name: Build (PR)

on:
  pull_request:
    branches: ['mc/**']
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  check:
    # Skip: draft PRs, release-please PRs
    if: |
      github.event.pull_request.draft == false &&
      !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Check formatting
        run: ./gradlew spotlessCheck --console=plain

      - name: Run tests
        run: ./gradlew :common:test --console=plain

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ github.run_id }}
          path: common/build/reports/tests/test/

  build:
    needs: check
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.loader == 'neoforge' }}
    strategy:
      fail-fast: false
      matrix:
        loader: [fabric, neoforge]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Compute version
        id: version
        run: |
          MC_VERSION="$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2)"
          SHA7="$(git rev-parse --short=7 HEAD)"
          PR_NUM="${{ github.event.pull_request.number }}"
          LOADER="${{ matrix.loader }}"

          BUILD_VERSION="dev-pr.${PR_NUM}+mc${MC_VERSION}.sha.${SHA7}"
          GRADLE_TASK=":${LOADER}:jar"

          echo "mod_version=$BUILD_VERSION" >> "$GITHUB_OUTPUT"
          echo "gradle_task=$GRADLE_TASK" >> "$GITHUB_OUTPUT"

      - name: Build
        run: ./gradlew ${{ steps.version.outputs.gradle_task }} --console=plain
        env:
          MOD_VERSION: ${{ steps.version.outputs.mod_version }}

      - name: Upload JAR
        uses: actions/upload-artifact@v7
        with:
          name: template-${{ matrix.loader }}-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}
          path: ${{ matrix.loader }}/build/libs/template-*.jar
